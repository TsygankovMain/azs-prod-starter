[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord.pid
user=root

[program:postgres]
command=/usr/local/bin/start-postgres.sh
user=postgres
autostart=true
autorestart=true
startsecs=5
stopsignal=TERM
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
priority=10

[program:db-init]
command=/usr/local/bin/init-db.sh
user=postgres
autostart=true
autorestart=false
startsecs=0
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
priority=20

[program:api]
command=/usr/local/bin/start-backend.sh
directory=/opt/app/backends/node/api
autostart=true
autorestart=true
startsecs=3
stopsignal=TERM
; Tell V8 to start GC at 768 MB so the OOM killer (cgroup limit) never
; fires a SIGKILL before Node gets a chance to do a graceful shutdown.
environment=NODE_OPTIONS="--max-old-space-size=768"
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
priority=30

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
startsecs=2
stopsignal=QUIT
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
priority=40
